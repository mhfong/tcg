name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Optional: yuyu-tei parser URL. Falls back to URL-only local
          # parser in DatabasePage.tsx when unset.
          VITE_YUYUTEI_PARSE_URL: ${{ secrets.VITE_YUYUTEI_PARSE_URL }}
          # Optional: SNKRDUNK og-meta proxy URL. Falls back to a
          # direct fetch (which will fail with CORS in the browser)
          # when unset, so the Validation subpage degrades to a "no
          # image" placeholder on the SNKRDUNK side.
          VITE_SNKRDUNK_META_URL: ${{ secrets.VITE_SNKRDUNK_META_URL }}
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
