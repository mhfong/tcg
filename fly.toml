# fly.toml app configuration file generated for yuyutei-parse on 2026-07-06T00:35:16+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'yuyutei-parse'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8787'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # CORS headers — Fly's edge proxy intercepts OPTIONS preflights and serves
  # them itself with a bare 204, stripping the CORS headers our Python app
  # would otherwise send. Defining them here makes the proxy inject them on
  # every response (including the preflight 204), which is what browsers
  # like Safari need to accept the cross-origin POST.
  [http_service.http_options.response.headers]
    Access-Control-Allow-Origin = '*'
    Access-Control-Allow-Methods = 'GET, POST, OPTIONS'
    Access-Control-Allow-Headers = 'content-type'
    Access-Control-Max-Age = '86400'

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
