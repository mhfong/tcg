<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="32" y1="32" x2="224" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e08860" />
      <stop offset="100%" stop-color="#b8a4c8" />
    </linearGradient>
  </defs>
  <!-- Rounded square background, matches --accent to --lavender gradient -->
  <rect x="0" y="0" width="256" height="256" rx="60" ry="60" fill="url(#bg)" />
  <!-- Two crossing bones (X) behind the pokéball, drawn as thick lines with knobby ends -->
  <g stroke="#fff" stroke-width="11" stroke-linecap="round" fill="#fff">
    <!-- Diagonal 1: top-left -> bottom-right -->
    <line x1="40" y1="40" x2="216" y2="216" />
    <circle cx="38" cy="50" r="11" />
    <circle cx="50" cy="38" r="11" />
    <circle cx="206" cy="216" r="11" />
    <circle cx="218" cy="206" r="11" />
    <!-- Diagonal 2: top-right -> bottom-left -->
    <line x1="216" y1="40" x2="40" y2="216" />
    <circle cx="206" cy="50" r="11" />
    <circle cx="218" cy="38" r="11" />
    <circle cx="38" cy="206" r="11" />
    <circle cx="50" cy="218" r="11" />
  </g>
  <!-- Pokéball in the center, slightly larger than the X so it sits on top -->
  <!-- The interior fill of the circle uses the same gradient, hiding the bone lines that pass through -->
  <circle cx="128" cy="128" r="64" fill="url(#bg)" />
  <circle cx="128" cy="128" r="60" fill="none" stroke="#fff" stroke-width="11" />
  <line x1="68" y1="128" x2="188" y2="128" stroke="#fff" stroke-width="11" stroke-linecap="round" />
  <circle cx="128" cy="128" r="20" fill="url(#bg)" stroke="#fff" stroke-width="9" />
  <circle cx="128" cy="128" r="7" fill="#fff" />
</svg>
