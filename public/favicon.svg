<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
	<defs>
		<linearGradient id="bg" x1="8" y1="8" x2="40" y2="40" gradientUnits="userSpaceOnUse">
			<stop offset="0%" stop-color="#e08860" />
			<stop offset="100%" stop-color="#b8a4c8" />
		</linearGradient>
	</defs>
	<rect x="4" y="4" width="40" height="40" rx="10" fill="url(#bg)" />
	<!-- Bone 1: top-left (long) to bottom-right (short) -->
	<line x1="1" y1="1" x2="40" y2="40" stroke="#fff" stroke-width="5.2" stroke-linecap="round" />
	<circle cx="-0.6" cy="2.6" r="3.3" fill="#fff" />
	<circle cx="2.6" cy="-0.6" r="3.3" fill="#fff" />
	<circle cx="38.4" cy="41.6" r="3.3" fill="#fff" />
	<circle cx="41.6" cy="38.4" r="3.3" fill="#fff" />
	<!-- Bone 2: top-right (long) to bottom-left (short) -->
	<line x1="47" y1="1" x2="8" y2="40" stroke="#fff" stroke-width="5.2" stroke-linecap="round" />
	<circle cx="48.6" cy="2.6" r="3.3" fill="#fff" />
	<circle cx="45.4" cy="-0.6" r="3.3" fill="#fff" />
	<circle cx="6.4" cy="41.6" r="3.3" fill="#fff" />
	<circle cx="9.6" cy="38.4" r="3.3" fill="#fff" />
	<!-- Gradient-filled mask hides bone interior, keeping pokéball clean -->
	<circle cx="24" cy="24" r="13.5" fill="url(#bg)" />
	<!-- Outer ring -->
	<circle cx="24" cy="24" r="14.5" stroke="#fff" stroke-width="3.3" fill="none" />
	<!-- Equator band -->
	<line x1="9.5" y1="24" x2="38.5" y2="24" stroke="#fff" stroke-width="3.3" stroke-linecap="round" />
	<!-- Center button ring -->
	<circle cx="24" cy="24" r="5" stroke="#fff" stroke-width="3.1" fill="url(#bg)" />
	<!-- Center dot -->
	<circle cx="24" cy="24" r="2" fill="#fff" />
</svg>